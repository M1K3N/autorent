{% extends 'main/base.html' %}

{% block title %}Anuluj rezerwację - AutoRent{% endblock %}

{% block content %}
<section class="reservation-delete-section">
    <div class="container">
        <h2>Anuluj rezerwację</h2>
        <p>Czy na pewno chcesz usunąć rezerwację dla <strong>{{ reservation.car.brand }} {{ reservation.car.model_name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Usuń rezerwację</button>
            <a href="{% url 'profile' %}" class="btn">Anuluj</a>
        </form>
    </div>
</section>
{% endblock %}
